# data/job_boards.yaml — company boards to watch for full-time / staff-style jobs.
#
# Greenhouse: boards.greenhouse.io/<token>
# Lever:      jobs.lever.co/<company>
# Ashby:      jobs.ashbyhq.com/<company>
#
# These public APIs are company-board APIs, not global search. Add/remove company slugs
# here to control the watched universe; criteria below narrows postings before the normal
# skill/preference scorer stores candidates.

greenhouse:
  - anthropic
  - databricks
  - scaleai
  - stripe
  - figma
  - airtable
  - mongodb
  - reddit
  - discord
  - asana
  - brex
  - gitlab
  - cloudflare
  - twilio
  - pinterest
  - dropbox
  - instacart
  - roblox
  - duolingo
  - hextechnologies
  - vercel
  - lyft
  # --- 2026-06-22: smaller / less brand-name companies (data / AI / analytics lane) ---
  - clickhouse
  - fivetran
  - hightouch
  - sigmacomputing
  - grafanalabs
  - amplitude
  - mixpanel
  - cockroachlabs
  - planetscale
  - faire
  - mercury
  - launchdarkly
  - renttherunway
  - lithic
  - alloy
  - webflow
  - assemblyai
  # --- 2026-06-22: remote-first companies (verified live US-remote data/AI roles) ---
  - affirm
  - coinbase
  - mozilla
  - doximity
  - smartsheet
  - customerio
  - temporaltechnologies
  - calendly
  - zoominfo
  - gusto
